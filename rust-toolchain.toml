# hisi-riscv-rs builds with the custom `hisi-riscv` toolchain: a stable rustc (1.96.0)
# with the target `riscv32imfc-unknown-none-elf` (hardware single-float ilp32f, no
# atomics) baked in as a BUILTIN — so we build without `-Z build-std`. The toolchain
# is chip-neutral (ws63 + bs2x both target riscv32imfc).
#
# You MUST install it first (it is not a distributable rustup channel) — pick the
# tarball for your host (linux x86_64/aarch64, macOS x86_64/aarch64, windows x86_64)
# and extract it straight into rustup's toolchains dir (no `link` needed):
#   curl -LO https://github.com/hispark-rs/hisi-riscv-rust-toolchain/releases/latest/download/hisi-riscv-rust-1.96.0-x86_64-unknown-linux-gnu.tar.gz
#   mkdir -p ~/.rustup/toolchains/hisi-riscv
#   tar xzf hisi-riscv-rust-1.96.0-*.tar.gz --strip-components=1 -C ~/.rustup/toolchains/hisi-riscv
#
# Build recipe + sources: https://github.com/hispark-rs/hisi-riscv-rust-toolchain
[toolchain]
channel = "hisi-riscv"
