# Default RISC-V target for WS63.
#
# The WS63 application core is RV32IMFC_Zicsr: hardware single-float (ilp32f) and NO
# atomic ('a') extension. We build for `riscv32imfc-unknown-none-elf`, which is a
# BUILTIN target in the custom `ws63` toolchain (see rust-toolchain.toml) — so no
# `-Z build-std` is needed (the toolchain ships precompiled core/alloc for it).
#
# The toolchain is built/distributed from:
#   https://github.com/sanchuanhehe/ws63-rust-toolchain   (release: rustup toolchain link ws63 …)
#
# `riscv32imfc` here has hardware float and uses forced-atomics + no-CAS, so atomic
# load/store lower to plain ld/st (single hart) and RMW goes through portable-atomic's
# critical-section polyfill (hisi-riscv-hal/Cargo.toml). No lr.w/sc.w/amo* are emitted.
[build]
target = "riscv32imfc-unknown-none-elf"

[target.riscv32imfc-unknown-none-elf]
runner = "gdb-multiarch"
# Disable RISC-V linker relaxation (matches the vendor C SDK flow; avoids gp-relative
# relaxation surprises with the custom linker scripts in hisi-riscv-rt).
rustflags = ["-C", "link-arg=--no-relax"]
