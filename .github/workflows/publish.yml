name: Publish crates

# Manual, CI-driven publish of the library crates to crates.io, in dependency
# order. Run from the Actions tab ("Run workflow"); leave dry-run ON for a safe
# package+check first, then re-run with dry-run OFF to actually upload.
#
# Token: the CARGO_REGISTRY_TOKEN repo secret. Remember to update CHANGELOGs and
# bump crate versions BEFORE a real publish (crates.io is immutable — versions
# can only be yanked, never replaced).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (package + check, no upload)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh

      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY: ${{ inputs.dry_run && '--dry-run' || '' }}
        run: |
          set -euo pipefail
          # --no-verify: these are no_std riscv32 crates; cargo's default verify
          # build targets the host and would fail. They are already built/tested
          # for the real target by the CI workflow.
          pub() {
            local crate="$1"
            echo "::group::cargo publish -p $crate $DRY"
            if cargo publish -p "$crate" --no-verify $DRY 2>&1 | tee /tmp/pub.log; then
              echo "$crate: ok"
            elif grep -qiE 'already (been )?(uploaded|published)|is already uploaded|already exists' /tmp/pub.log; then
              echo "$crate: this version is already on crates.io — skipping"
            else
              echo "$crate: FAILED"; exit 1
            fi
            echo "::endgroup::"
          }

          # 1) leaf PACs (depend only on already-published crates)
          pub bs2x-pac
          pub ws63-pac
          # 2) let crates.io index the PACs before publishing their dependents
          if [ -z "$DRY" ]; then echo "waiting 45s for crates.io to index the PACs…"; sleep 45; fi
          # 3) crates that depend on the PACs (hal/rt are independent of each other)
          pub hisi-riscv-rt
          pub hisi-riscv-hal

          echo "Done${DRY:+ (dry run — nothing uploaded)}."
