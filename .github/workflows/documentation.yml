name: Documentation

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'hisi-riscv-hal/src/**'
      - 'hisi-riscv-hal/Cargo.toml'
      - 'ws63-pac/src/**'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'hisi-riscv-hal/src/**'
      - 'ws63-pac/src/**'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build API docs ────────────────────────────────────────────
  docs:
    name: Build API Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          # registry/git only — target/ is toolchain-specific (see ci.yml note).
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-ws63-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ws63-docs-

      - name: Build API documentation (hisi-riscv-hal/pac/rt)
        run: cargo doc -p hisi-riscv-hal -p ws63-pac -p hisi-riscv-rt --no-deps

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: api-docs
          path: target/riscv32imfc-unknown-none-elf/doc/

  # ── Deploy to GitHub Pages ────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v7
        with:
          name: api-docs
          path: docs-output

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ── Link check ────────────────────────────────────────────────
  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '*.md' '**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}