name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Toolchain + default target come from rust-toolchain.toml (stable + riscv32imc).

jobs:
  # ── Create GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh

      # Build the default-members (libraries + blinky). blinky links and is packaged
      # below; the experimental flashboot binary is not built/attached here.
      - name: Build default members (release)
        run: cargo build --release

      # Package the blinky firmware. rust-objcopy lives in the ws63 toolchain's
      # rustlib bin (bundled from the CI LLVM), not on PATH — resolve via the sysroot.
      - name: Package firmware
        run: |
          set -euo pipefail
          OUT=target/riscv32imfc-unknown-none-elf/release
          OBJCOPY="$(rustc +ws63 --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/rust-objcopy"
          shopt -s nullglob
          for elf in "$OUT"/blinky; do
            [ -f "$elf" ] || continue
            "$OBJCOPY" -O binary "$elf" "$elf.bin"
            cp "$elf" "$elf.elf"
            echo "packaged $(basename "$elf").bin / .elf"
          done

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: .github/changelog-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          # Globs match the actual artifact names (.elf/.bin). They produce no files
          # until firmware packaging above runs; gh-release just skips empty matches.
          files: |
            target/riscv32imfc-unknown-none-elf/release/blinky.bin
            target/riscv32imfc-unknown-none-elf/release/blinky.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── crates.io publishing is OWNED BY EACH CRATE'S OWN REPO ─────────────────
  # The monorepo tag only cuts the firmware GitHub Release above. Each library
  # crate is a standalone submodule repo and publishes ITSELF from its own
  # `.github/workflows/release.yml` (triggered by a `v*` tag in that repo, using
  # that repo's CRATES_IO_TOKEN secret). The parent must not reach in and publish
  # the submodules' crates — that couples independent releases and inverts
  # ownership. To release a crate, bump + tag it in its own repo:
  #   ws63-pac  -> github.com/sanchuanhehe/ws63-pac   (release.yml)
  #   ws63-rt   -> github.com/sanchuanhehe/ws63-rt    (release.yml)
  #   ws63-hal  -> github.com/sanchuanhehe/ws63-hal   (release.yml)
  # ws63-flashboot / ws63-rf-rs are publish=false (not published).
