name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imafc-unknown-none-elf

      - name: Build all crates
        run: cargo build --release --target riscv32imafc-unknown-none-elf

      - name: Build all examples
        run: cargo build --examples --release --target riscv32imafc-unknown-none-elf || true

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: .github/changelog-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          files: |
            target/riscv32imafc-unknown-none-elf/release/*.bin
            target/riscv32imafc-unknown-none-elf/release/*.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish crates ────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    strategy:
      matrix:
        crate: [ws63-pac, ws63-hal, ws63-rt]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish ${{ matrix.crate }}
        run: cargo publish -p ${{ matrix.crate }} --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true