name: CI (Nightly toolchain)

on:
  schedule:
    # Run at 04:43 UTC daily
    - cron: '43 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# This workflow is a FORWARD-COMPATIBILITY signal: it builds the project on the
# Rust *nightly* toolchain (the project itself ships on stable per rust-toolchain.toml)
# to catch upcoming breakage early. It is advisory (continue-on-error) and does not
# gate merges.

jobs:
  nightly-build:
    name: Nightly-toolchain check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust nightly + riscv32imc target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imc-unknown-none-elf
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-nightly-
      - name: Check workspace (nightly)
        run: cargo +nightly check --workspace --target riscv32imc-unknown-none-elf
      - name: Clippy (nightly)
        run: cargo +nightly clippy --workspace --exclude ws63-flashboot --target riscv32imc-unknown-none-elf -- -D warnings

  size-report:
    name: Library Size Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install toolchain (rust-toolchain.toml)
        run: rustup show
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-size-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-size-
      # Build the default-members (libraries + blinky) and report the firmware size.
      - name: Build default members (release)
        run: cargo build --release
      - name: Report blinky firmware size
        run: |
          ELF=target/riscv32imc-unknown-none-elf/release/blinky
          ls -la "$ELF"
          size "$ELF" || rust-size "$ELF" || true
