name: Scheduled build + size

on:
  schedule:
    # Run at 04:43 UTC daily
    - cron: '43 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Daily scheduled build of the firmware with the pinned `ws63` toolchain, plus a
# blinky size report. (The old "nightly upstream toolchain" forward-compat job was
# dropped: ws63-rs pins the custom `ws63` toolchain whose riscv32imfc target is not a
# builtin in upstream nightly, so a plain `+nightly` build is not meaningful here.)

jobs:
  size-report:
    name: Build + firmware size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-size-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-size-
      - name: Build default members (release, links blinky)
        run: cargo build --release
      - name: Report blinky firmware size
        run: |
          ELF=target/riscv32imfc-unknown-none-elf/release/blinky
          ls -la "$ELF"
          SIZE="$(rustc +ws63 --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/rust-size"
          "$SIZE" "$ELF" || true
