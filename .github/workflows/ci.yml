name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ws63-rs builds with the custom `ws63` toolchain (stable rustc with the WS63
# riscv32imfc hard-float target baked in as a builtin; see rust-toolchain.toml).
# Each job installs+links it from the ws63-rust-toolchain release via
# .github/scripts/install-toolchain.sh. Default target (riscv32imfc) is in
# .cargo/config.toml; no -Z build-std needed (toolchain ships precompiled core).

jobs:
  # ── Per-crate check ─────────────────────────────────────────────
  build:
    name: Check (RISC-V)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [ws63-pac, ws63-hal, ws63-rt]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh
      - uses: actions/cache@v4
        with:
          # NOTE: do NOT cache target/ — it is built by the custom `ws63` rustc whose
          # strict-version-hash differs from any other 1.96.0; a stale target/ from a
          # different toolchain causes E0463 "can't find crate". Registry/git caches are
          # toolchain-agnostic (just crate sources) and safe.
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-ws63-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ws63-
      - name: Check ${{ matrix.crate }}
        run: cargo check -p ${{ matrix.crate }}

  # ── Full workspace check + library build ────────────────────────
  workspace:
    name: Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh
      - uses: actions/cache@v4
        with:
          # NOTE: do NOT cache target/ — it is built by the custom `ws63` rustc whose
          # strict-version-hash differs from any other 1.96.0; a stale target/ from a
          # different toolchain causes E0463 "can't find crate". Registry/git caches are
          # toolchain-agnostic (just crate sources) and safe.
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-ws63-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ws63-
      # Covers every member (incl. blinky + flashboot) at the type/codegen level.
      - name: Check workspace
        run: cargo check --workspace
      # Real build (link) of the default-members: the libraries + the blinky example
      # (blinky links via ws63-rt's exported linker scripts). The experimental
      # flashboot binary is excluded from the default build. No `|| true` masking.
      - name: Build default members (release, links blinky)
        run: cargo build --release

  # ── Clippy (gating) ─────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh
      - uses: actions/cache@v4
        with:
          # NOTE: do NOT cache target/ — it is built by the custom `ws63` rustc whose
          # strict-version-hash differs from any other 1.96.0; a stale target/ from a
          # different toolchain causes E0463 "can't find crate". Registry/git caches are
          # toolchain-agnostic (just crate sources) and safe.
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-ws63-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ws63-
      # Gating: no `continue-on-error`, no `| head` (which would swallow the exit code).
      # ws63-flashboot is excluded — it is experimental (publish=false, out of the
      # default build), so its lints are not a merge gate. `cargo check --workspace`
      # above still compile-checks it.
      - name: Run clippy
        run: cargo clippy --workspace --exclude ws63-flashboot -- -D warnings

  # ── Format check ────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh
      - name: Check formatting
        run: cargo fmt --all -- --check

  # NOTE: there is intentionally no host-test job. ws63-hal contains raw RISC-V
  # inline asm (e.g. `asm!("ebreak")` in system.rs), so the crate cannot compile
  # for a host (x86) target, and the previous host-test job masked that with
  # `|| echo`. Enabling genuine host unit tests requires cfg-gating the riscv asm
  # behind `#[cfg(target_arch = "riscv32")]` — tracked in ROADMAP phase 2.

  # ── Dependency audit (advisory) ─────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    # rustsec/audit-check posts results as a check-run/annotations; needs checks: write
    # (default token is read-only here → "Resource not accessible by integration").
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # rust-toolchain.toml pins ws63, so cargo (used by the audit action) needs it installed.
      - name: Install ws63 toolchain
        run: bash .github/scripts/install-toolchain.sh
      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
