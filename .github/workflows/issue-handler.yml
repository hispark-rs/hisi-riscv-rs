name: Issue Handler

on:
  issues:
    types: [opened]

jobs:
  # ── Auto-label new issues ────────────────────────────────────
  triage:
    name: Auto Triage
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v7

      - name: Add triage label
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            // Match on the TITLE only, with whole-word boundaries. Matching the
            // body (and bare substrings) produced false positives — e.g. "ble"
            // inside "problem"/"enable", "dma"/"spi"/"pac" inside unrelated prose —
            // so every issue collected nearly every component label. Titles in this
            // repo name their component(s) explicitly, so title-only is enough.
            const title = issue.title;
            // A token must be delimited by start/end or a NON-alphanumeric char.
            // Unlike \b, this treats '_' as a delimiter, so code identifiers like
            // "uart_echo" / "i2c_scan" / "spi_loopback" match, while substrings
            // inside words ("ble" in "problem"/"enable", "pac" in "space") do not.
            const tok = (alt) =>
              new RegExp('(^|[^a-z0-9])(' + alt + ')([^a-z0-9]|$)', 'i').test(title);

            const labels = new Set();

            // Category (first match wins)
            if (tok('bugs?|fails?|failing|failure|errors?|broken|regression|crash|panic')) {
              labels.add('bug');
            } else if (tok('feature|enhance(?:ment)?|implement|support|add')) {
              labels.add('enhancement');
            } else if (tok('docs?|documentation|readme|typo')) {
              labels.add('documentation');
            } else if (tok('question|how-?to')) {
              labels.add('question');
            }

            // Component (title only)
            const components = [
              ['gpio', 'component:gpio'],
              ['uart', 'component:uart'],
              ['i2c', 'component:i2c'],
              ['spi', 'component:spi'],
              ['dma', 'component:dma'],
              ['wi-?fi', 'component:wifi'],
              ['ble|sle|bt', 'component:ble'],
              ['hal', 'component:hal'],
              ['pac', 'component:pac'],
            ];
            for (const [alt, label] of components) if (tok(alt)) labels.add(label);

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [...labels]
              });
            }

  # ── Welcome comment for first-time contributors ───────────────
  welcome:
    name: Welcome New Contributors
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          # first-interaction@v3 requires BOTH issue_message and pr_message
          # (each is required: true and throws if absent), even though this
          # workflow only triggers on issues. Supply both.
          issue_message: |
            👋 Thanks for opening your first issue in ws63-rs!

            Please ensure you've checked:
            - [ ] The [FAQ / Known Issues](https://github.com/hispark-rs/hisi-riscv-rs/wiki)
            - [ ] Existing [open issues](https://github.com/hispark-rs/hisi-riscv-rs/issues)

            For hardware-related issues, please include:
            - WS63 chip variant (WS63 / WS63E)
            - Development board model
            - Rust toolchain version (`rustc --version`)
          pr_message: |
            👋 Thanks for your first pull request to ws63-rs!

            Please make sure:
            - [ ] `cargo fmt --all` and `cargo clippy` pass
            - [ ] The change builds for the WS63 target
            - [ ] Submodule changes are committed in the submodule first, then the pointer bumped
