name: Issue Handler

on:
  issues:
    types: [opened]

jobs:
  # ── Auto-label new issues ────────────────────────────────────
  triage:
    name: Auto Triage
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Add triage label
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            // Match on the TITLE only, with whole-word boundaries. Matching the
            // body (and bare substrings) produced false positives — e.g. "ble"
            // inside "problem"/"enable", "dma"/"spi"/"pac" inside unrelated prose —
            // so every issue collected nearly every component label. Titles in this
            // repo name their component(s) explicitly, so title-only is enough.
            const title = issue.title;
            const has = (re) => re.test(title);

            const labels = new Set();

            // Category (first match wins)
            if (has(/\b(bug|fails?|failing|failure|error|broken|regression|crash|panic)\b/i)) {
              labels.add('bug');
            } else if (has(/\b(feature|enhance(ment)?|implement|support|add)\b/i)) {
              labels.add('enhancement');
            } else if (has(/\b(docs?|documentation|readme|typo)\b/i)) {
              labels.add('documentation');
            } else if (has(/\b(question|how-to|howto)\b/i)) {
              labels.add('question');
            }

            // Component (whole-word, title only)
            const components = [
              [/\bgpio\b/i, 'component:gpio'],
              [/\buart\b/i, 'component:uart'],
              [/\bi2c\b/i, 'component:i2c'],
              [/\bspi\b/i, 'component:spi'],
              [/\bdma\b/i, 'component:dma'],
              [/\bwi-?fi\b/i, 'component:wifi'],
              [/\b(ble|sle|bt)\b/i, 'component:ble'],
              [/\bhal\b/i, 'component:hal'],
              [/\bpac\b/i, 'component:pac'],
            ];
            for (const [re, label] of components) if (has(re)) labels.add(label);

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [...labels]
              });
            }

  # ── Welcome comment for first-time contributors ───────────────
  welcome:
    name: Welcome New Contributors
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            👋 Thanks for opening your first issue in ws63-rs!

            Please ensure you've checked:
            - [ ] The [FAQ / Known Issues](https://github.com/sanchuanhehe/hisi-riscv-rs/wiki)
            - [ ] Existing [open issues](https://github.com/sanchuanhehe/hisi-riscv-rs/issues)

            For hardware-related issues, please include:
            - WS63 chip variant (WS63 / WS63E)
            - Development board model
            - Rust toolchain version (`rustc --version`)
